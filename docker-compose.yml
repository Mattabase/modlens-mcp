version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: modlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: modlens
      POSTGRES_PASSWORD: modlens
      POSTGRES_DB: modlens
    ports:
      - "5433:5432"
    volumes:
      - modlens-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional Ollama container for semantic search.
  # Start with:  docker compose --profile semantic up -d
  # Or use the setup wizard:  npm run setup
  ollama:
    image: ollama/ollama
    container_name: modlens-ollama
    profiles: ["semantic"]
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - modlens-ollama:/root/.ollama
    # GPU passthrough (requires NVIDIA GPU + nvidia-container-toolkit):
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  modlens-pgdata:
  modlens-ollama:
